name: Setup node and pnpm
description: >
  Configures devbox, node, pnpm, cache, performs pnpm install

inputs:
  pnpm-run-install:
    description: Whether to run pnpm install
    required: false
    default: "true"
  pnpm-restore-cache:
    description: Whether to restore cache
    required: false
    default: "true"
  pnpm-install-cache-key:
    description: The cache key for the pnpm install cache
    required: false
    default: ${{ runner.os }}-nextjs-${{ hashFiles('**/pnpm-lock.yaml') }}-${{ hashFiles('**/*.js', '**/*.jsx', '**/*.ts', '**/*.tsx') }}

runs:
  using: composite
  steps:
    - name: devenv installer
      uses: cachix/install-nix-action@8aa03977d8d733052d78f4e008a241fd1dbf36b3 # v31.10.6

    - name: cachix cache
      uses: cachix/cachix-action@5f2d7c5294214f71b873db4b969586b980625e71 # v17
      with:
        name: devenv

    - name: Install devenv.sh
      shell: bash
      run: nix profile add nixpkgs#devenv

    # - name: Get pnpm store path
    #   if: ${{ inputs.pnpm-restore-cache == 'true' }}
    #   id: pnpm-path
    #   shell: bash
    #   run: |
    #     STORE_PATH=$(devenv shell -- pnpm store path)
    #     echo "STORE_PATH=$STORE_PATH" >> $GITHUB_OUTPUT

    - name: Restore pnpm install cache
      if: ${{ inputs.pnpm-restore-cache == 'true' }}
      uses: actions/cache/restore@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
      id: cache-restore
      with:
        # ${{ steps.pnpm-path.outputs.STORE_PATH }}
        path: |
          ~/.pnpm-store
          ${{ github.workspace }}/.next/cache
        key: ${{ inputs.pnpm-install-cache-key }}
        restore-keys: |
          ${{ runner.os }}-nextjs-${{ hashFiles('**/pnpm-lock.yaml') }}-

    - name: Run pnpm install
      if: ${{ inputs.pnpm-run-install == 'true' }}
      shell: devenv shell bash -- -e {0}
      run: pnpm install --frozen-lockfile

    - name: Save pnpm install cache
      if: ${{ inputs.pnpm-restore-cache == 'true' && steps.cache-restore.outputs.cache-hit != 'true' }}
      uses: actions/cache/save@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
      with:
        path: |
          ${{ steps.pnpm-path.outputs.STORE_PATH }}
          ${{ github.workspace }}/.next/cache
        key: ${{ inputs.pnpm-install-cache-key }}
