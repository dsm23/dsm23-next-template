services:
  otel-lgtm:
    image: grafana/otel-lgtm:0.29.1@sha256:b4da8bf6b1b44f6f683883869619eb9781465c642ce5f2d70591fb27094ddb1c
    ports:
      - "4000:3000"
      - "4317:4317"
      - "4318:4318"
    restart: "no"

  web:
    build:
      context: ./
    develop:
      watch:
        - action: rebuild
          path: .
    ports:
      - "3000:3000"
    healthcheck:
      test:
        - CMD
        - node
        - "--eval"
        - '"fetch(''http://0.0.0.0:3000/api/health'').then(r => process.exit(r.status === 200 ? 0 : 1))"'
      start_interval: 5s
      start_period: 5s
