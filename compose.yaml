services:
  otel-lgtm:
    image: grafana/otel-lgtm:0.27.0@sha256:90bc0af9bb9c21c7e95380d39e37d5959cd72a5622131f4c35d3d8f8cbd8201a
    ports:
      - "4000:3000"
      - "4317:4317"
      - "4318:4318"
    restart: "no"

  web:
    build:
      context: ./
    develop:
      watch:
        - action: rebuild
          path: .
    ports:
      - "3000:3000"
    healthcheck:
      test:
        - CMD
        - node
        - "--eval"
        - '"fetch(''http://0.0.0.0:3000/api/health'').then(r => process.exit(r.status === 200 ? 0 : 1))"'
      start_interval: 5s
      start_period: 5s
