services:
  otel-lgtm:
    image: grafana/otel-lgtm:0.28.0@sha256:10f48eb2f8670134df542177bb19536c55421b089e43f9dfc2a27d4c078204d8
    ports:
      - "4000:3000"
      - "4317:4317"
      - "4318:4318"
    restart: "no"

  web:
    build:
      context: ./
    develop:
      watch:
        - action: rebuild
          path: .
    ports:
      - "3000:3000"
    healthcheck:
      test:
        - CMD
        - node
        - "--eval"
        - '"fetch(''http://0.0.0.0:3000/api/health'').then(r => process.exit(r.status === 200 ? 0 : 1))"'
      start_interval: 5s
      start_period: 5s
